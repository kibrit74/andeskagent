<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Agentic CLI</title>
    <link rel="stylesheet" href="/mobile-cli/style.css?v=27">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        .desktop-qr-widget {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(9, 19, 34, 0.85);
            border: 1px solid rgba(130, 170, 255, 0.2);
            border-radius: 12px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            z-index: 10000;
            width: 140px;
        }

        .desktop-qr-widget img {
            width: 100px;
            height: 100px;
            background: #ffffff;
            padding: 4px;
            border-radius: 8px;
            margin-bottom: 8px;
        }

        .desktop-qr-widget .qr-text {
            color: #9fb0c7;
            font-size: 11px;
            text-align: center;
            font-family: system-ui, -apple-system, sans-serif;
            line-height: 1.3;
        }

        /* Ekran küçüldüğünde QR kodu gizle çünkü adam zaten mobildedir */
        @media (max-width: 768px) {
            .desktop-qr-widget {
                display: none;
            }
        }
    </style>
</head>
<body>
    <!-- Sayfanın köşesindeki küçük barkod uyarı widget'ı -->
    <div class="desktop-qr-widget">
        <img id="qr-image" alt="Mobil CLI Barkod" />
        <div class="qr-text">Mobil CLI için barkodu tarayın</div>
    </div>
    <div id="screen-global-blocker" class="screen-global-blocker" aria-hidden="true"></div>

    <!-- Orijinal Terminal Arayüzü -->
    <div class="terminal-container">
        <!-- Mac Style Header -->
        <div class="terminal-header">
            <div class="window-controls">
                <span class="control close"></span>
                <span class="control minimize"></span>
                <span class="control maximize"></span>
            </div>
            <div class="window-title">⚙️ Agentic Shell</div>
            <div class="header-actions">
                <button id="endpoint-panel-toggle" class="screen-toggle-btn endpoint-toggle-btn" title="Endpoint Cihazlari">Cihazlar</button>
                <div class="theme-dots" aria-label="Tema Seçimi">
                    <button class="theme-dot active" data-theme="default" style="background: #040609;" title="Varsayılan Tema"></button>
                    <button class="theme-dot" data-theme="burgundy" style="background: #4e1331;" title="Bordo Tema"></button>
                    <button class="theme-dot" data-theme="gold" style="background: #8a6924;" title="Altın Tema"></button>
                </div>
                <button id="screen-toggle" class="screen-toggle-btn" title="Canlı Ekran">📺</button>
            </div>
        </div>

        <div id="screen-preview" class="screen-preview hidden">
            <div class="screen-preview-header">
                <span class="screen-live-badge">🔴 Canlı Ekran</span>
                <div class="screen-preview-actions">
                    <button id="screen-control-toggle" class="screen-control-btn" title="Tıklama Kontrolü">Kontrol: Kapalı</button>
                    <button id="screen-click-mode" class="screen-control-btn" title="Tık Modu">Tık: Çift</button>
                    <button id="screen-debug-toggle" class="screen-control-btn" title="Debug">Debug: Kapalı</button>
                    <button id="screen-fullscreen-toggle" class="screen-control-btn" title="Tam Ekran">Tam Ekran</button>
                    <button id="screen-close" class="screen-close-btn">✕</button>
                </div>
            </div>
            <img id="screen-frame" class="screen-frame" alt="Ekran" />
            <canvas id="screen-canvas" class="screen-canvas" width="0" height="0"></canvas>
            <canvas id="screen-debug-canvas" class="screen-canvas debug-canvas" width="0" height="0"></canvas>
            <div id="screen-click-layer" class="screen-click-layer" aria-hidden="true"></div>
        </div>

        <div id="endpoint-panel" class="endpoint-panel hidden">
            <div class="endpoint-panel-header">
                <div>
                    <div class="endpoint-panel-title">Endpoint Cihazlari</div>
                    <div class="endpoint-panel-subtitle">Web'den canli agent job testi</div>
                </div>
                <div class="endpoint-panel-actions">
                    <button id="endpoint-refresh" class="endpoint-action-btn">Yenile</button>
                    <button id="endpoint-run-status" class="endpoint-action-btn primary">Sistem Durumu Gonder</button>
                    <button id="endpoint-panel-close" class="screen-close-btn">x</button>
                </div>
            </div>
            <div id="endpoint-panel-status" class="endpoint-panel-status">Cihaz listesi bekleniyor.</div>
            <div id="endpoint-device-list" class="endpoint-device-list"></div>
            <div id="endpoint-job-result" class="endpoint-job-result"></div>
        </div>

        <!-- Terminal Output Area -->
        <div class="terminal-body" id="terminal-body">
            <div class="message system">
                <span class="status-icon">🚀</span>
                <span class="text">Agentic CLI v2.0 - Backend'e bağlandı.</span>
            </div>
            <div class="message system">
                <span class="text" style="color: #6e7681;">İpuçları: Uygulama kurabilir, dosya oluşturabilir veya analiz isteyebilirsiniz.</span>
            </div>
            <!-- Dynamic content injected here -->
        </div>

        <!-- Sticky Input Area -->
        <div class="terminal-input-wrapper">
            <span class="prompt-icon">❯</span>
            <textarea id="cli-input" class="cli-input" placeholder="Yapay zekaya komut verin..." rows="1" autocomplete="off"></textarea>
        </div>
    </div>
    
    <script>
        const tokenParam = new URLSearchParams(window.location.search).get('token') || '';
        const targetUrl = new URL('/mobile-cli/' + (tokenParam ? `?token=${encodeURIComponent(tokenParam)}` : ''), window.location.href).toString();
        const qrImage = document.getElementById('qr-image');
        qrImage.src = `/qr.svg?target=${encodeURIComponent(targetUrl)}`;
    </script>
    <script src="/mobile-cli/app.js?v=27"></script>
</body>
</html>
