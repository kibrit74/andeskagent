<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Agentic CLI (Claude Code Style)</title>
    <link rel="stylesheet" href="/mobile-cli/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        .desktop-qr-widget {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(9, 19, 34, 0.85);
            border: 1px solid rgba(130, 170, 255, 0.2);
            border-radius: 12px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            z-index: 10000;
            width: 140px;
        }

        .desktop-qr-widget img {
            width: 100px;
            height: 100px;
            background: #ffffff;
            padding: 4px;
            border-radius: 8px;
            margin-bottom: 8px;
        }

        .desktop-qr-widget .qr-text {
            color: #9fb0c7;
            font-size: 11px;
            text-align: center;
            font-family: system-ui, -apple-system, sans-serif;
            line-height: 1.3;
        }

        /* Ekran küçüldüğünde QR kodu gizle çünkü adam zaten mobildedir */
        @media (max-width: 768px) {
            .desktop-qr-widget {
                display: none;
            }
        }
    </style>
</head>
<body>
    <!-- Sayfanın köşesindeki küçük barkod uyarı widget'ı -->
    <div class="desktop-qr-widget">
        <img id="qr-image" alt="Mobil CLI Barkod" />
        <div class="qr-text">Mobil CLI için barkodu tarayın</div>
    </div>

    <!-- Orijinal Terminal Arayüzü -->
    <div class="terminal-container">
        <!-- Mac Style Header -->
        <div class="terminal-header">
            <div class="window-controls">
                <span class="control close"></span>
                <span class="control minimize"></span>
                <span class="control maximize"></span>
            </div>
            <div class="window-title">⚙️ Agentic Shell (Claude Code)</div>
            <div class="window-spacer"></div>
        </div>

        <!-- Terminal Output Area -->
        <div class="terminal-body" id="terminal-body">
            <div class="message system">
                <span class="status-icon">🚀</span>
                <span class="text">Agentic CLI v2.0 - Backend'e bağlandı.</span>
            </div>
            <div class="message system">
                <span class="text" style="color: #6e7681;">İpuçları: Uygulama kurabilir, dosya oluşturabilir veya analiz isteyebilirsiniz.</span>
            </div>
            <!-- Dynamic content injected here -->
        </div>

        <!-- Sticky Input Area -->
        <div class="terminal-input-wrapper">
            <span class="prompt-icon">❯</span>
            <input type="text" id="cli-input" class="cli-input" placeholder="Yapay zekaya komut verin..." autocomplete="off">
        </div>
    </div>
    
    <script>
        const targetUrl = new URL('/mobile-cli/', window.location.href).toString();
        const qrImage = document.getElementById('qr-image');
        qrImage.src = `/qr.svg?target=${encodeURIComponent(targetUrl)}`;
    </script>
    <script src="/mobile-cli/app.js"></script>
</body>
</html>
