<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Agentic CLI</title>
    <link rel="stylesheet" href="style.css?v=26">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="terminal-container">
        <div class="terminal-header">
            <div class="window-controls" aria-hidden="true">
                <span class="control close"></span>
                <span class="control minimize"></span>
                <span class="control maximize"></span>
            </div>
            <div class="window-title">Agentic Shell</div>
            <div class="header-actions">
                <div class="theme-dots" aria-label="Tema Seçimi">
                    <button class="theme-dot active" data-theme="default" style="background: #040609;" title="Varsayılan Tema"></button>
                    <button class="theme-dot" data-theme="burgundy" style="background: #4e1331;" title="Bordo Tema"></button>
                    <button class="theme-dot" data-theme="gold" style="background: #8a6924;" title="Altın Tema"></button>
                </div>
                <button id="screen-toggle" class="screen-toggle-btn" title="Canlı Ekran">📺</button>
            </div>
        </div>

        <div id="screen-preview" class="screen-preview hidden">
            <div class="screen-preview-header">
                <span class="screen-live-badge">🔴 Canlı Ekran</span>
                <div class="screen-preview-actions">
                    <button id="screen-control-toggle" class="screen-control-btn" title="Tıklama Kontrolü">Kontrol: Kapalı</button>
                    <button id="screen-click-mode" class="screen-control-btn" title="Tık Modu">Tık: Çift</button>
                    <button id="screen-debug-toggle" class="screen-control-btn" title="Debug">Debug: Kapalı</button>
                    <button id="screen-fullscreen-toggle" class="screen-control-btn" title="Tam Ekran">Tam Ekran</button>
                    <button id="screen-close" class="screen-close-btn">✕</button>
                </div>
            </div>
            <img id="screen-frame" class="screen-frame" alt="Ekran" />
            <canvas id="screen-canvas" class="screen-canvas" width="0" height="0"></canvas>
            <canvas id="screen-debug-canvas" class="screen-canvas debug-canvas" width="0" height="0"></canvas>
            <div id="screen-click-layer" class="screen-click-layer" aria-hidden="true"></div>
        </div>

        <div class="terminal-body" id="terminal-body">
            <div class="message system">
                <span class="status-icon">&gt;</span>
                <span class="text">Agentic CLI v1.0 baslatildi.</span>
            </div>
            <div class="message system">
                <span class="text subtle-text">Ipuclari: uygulama acma, dosya islemleri ve analiz komutlari yazabilirsiniz.</span>
            </div>
        </div>

        <div class="terminal-input-wrapper">
            <span class="prompt-icon">&gt;</span>
            <textarea id="cli-input" class="cli-input" placeholder="Yapay zekaya komut verin..." rows="1"></textarea>
        </div>
    </div>
    <div id="screen-global-blocker" class="screen-global-blocker" aria-hidden="true"></div>
    <script src="app.js?v=26"></script>
</body>
</html>
