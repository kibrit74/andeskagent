<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Agentic CLI</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="terminal-container">
        <div class="terminal-header">
            <div class="window-controls" aria-hidden="true">
                <span class="control close"></span>
                <span class="control minimize"></span>
                <span class="control maximize"></span>
            </div>
            <div class="window-title">Agentic Shell</div>
            <div class="window-spacer" aria-hidden="true"></div>
        </div>

        <div class="terminal-body" id="terminal-body">
            <div class="message system">
                <span class="status-icon">&gt;</span>
                <span class="text">Agentic CLI v1.0 baslatildi.</span>
            </div>
            <div class="message system">
                <span class="text subtle-text">Ipuclari: uygulama acma, dosya islemleri ve analiz komutlari yazabilirsiniz.</span>
            </div>
        </div>

        <div class="terminal-input-wrapper">
            <span class="prompt-icon">&gt;</span>
            <textarea id="cli-input" class="cli-input" placeholder="Yapay zekaya komut verin..." rows="1"></textarea>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
